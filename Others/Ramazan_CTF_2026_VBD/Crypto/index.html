<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eid Mubarak | Burger Zaeema 🤍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #0a0f1a 0%, #010101 100%);
            font-family: 'Fira Code', 'Courier New', 'SF Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== ANIMATED BACKGROUND (subtle matrix-style rain + particles) ===== */
        #matrixCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.28;
        }

        /* Main container */
        .greeting-container {
            position: relative;
            z-index: 10;
            max-width: 780px;
            width: 100%;
            animation: fadeSlideUp 1s ease forwards;
        }

        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(25px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass/Terminal Card */
        .terminal-card {
            background: rgba(8, 18, 28, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 255, 200, 0.45);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 180, 0.2);
            padding: 2rem 2rem 2.2rem;
            transition: all 0.3s ease;
        }

        .terminal-card:hover {
            border-color: rgba(0, 255, 200, 0.8);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.6), 0 0 28px rgba(0, 255, 200, 0.35);
        }

        /* Large glowing Eid Mubarak heading */
        .glow-heading {
            text-align: center;
            font-size: 3.4rem;
            font-weight: 700;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00ffcc, #44ffaa, #c3ff7a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px rgba(0, 255, 200, 0.6);
            margin-bottom: 1.5rem;
            animation: headingPulse 2s infinite alternate;
        }

        @keyframes headingPulse {
            0% {
                text-shadow: 0 0 4px #0ff, 0 0 10px #0fa;
            }
            100% {
                text-shadow: 0 0 18px #0ff, 0 0 28px #7effaa;
            }
        }

        /* Terminal message area */
        .message-panel {
            background: rgba(0, 8, 18, 0.7);
            border-radius: 1.2rem;
            padding: 1.6rem;
            margin: 0.8rem 0 0.5rem;
            border-left: 4px solid #0ff;
            border-right: 1px solid rgba(0, 255, 180, 0.2);
            font-family: 'Fira Code', 'Courier New', monospace;
        }

        .message-content {
            color: #dcf5ff;
            font-size: 1rem;
            line-height: 1.7;
            letter-spacing: 0.2px;
            white-space: pre-wrap;
            word-break: break-word;
            min-height: 260px;
        }

        .typed-area {
            display: inline;
        }

        .cursor {
            display: inline-block;
            width: 11px;
            height: 1.35rem;
            background-color: #0ff;
            vertical-align: middle;
            margin-left: 3px;
            box-shadow: 0 0 8px #0ff;
            animation: cursorBlink 1s step-end infinite;
            border-radius: 2px;
        }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; background-color: #0ff; }
            50% { opacity: 0; background-color: #aaffdd; }
        }

        /* Fun footer badge */
        .footer-badge {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1.4rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0, 255, 200, 0.3);
            font-size: 0.7rem;
            color: #70e6c0;
            flex-wrap: wrap;
            font-family: monospace;
        }

        .badge-item {
            background: rgba(0, 30, 35, 0.55);
            padding: 0.25rem 1rem;
            border-radius: 30px;
            backdrop-filter: blur(2px);
        }

        .burger-emoji {
            animation: wiggle 1.5s infinite ease;
            display: inline-block;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #010408;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.9s cubic-bezier(0.2, 0.9, 0.4, 1);
            font-family: 'Fira Code', monospace;
        }

        .loader-text {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
            background: rgba(0, 20, 30, 0.6);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            border-left: 2px solid #0ff;
            border-right: 2px solid #0ff;
            animation: loaderPulse 1.2s infinite alternate;
        }

        @keyframes loaderPulse {
            0% { opacity: 0.6; text-shadow: 0 0 2px #0ff; box-shadow: 0 0 6px rgba(0,255,180,0.3); }
            100% { opacity: 1; text-shadow: 0 0 18px #0ff; box-shadow: 0 0 22px rgba(0,255,180,0.7); }
        }

        .loader-sub {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: #88ffd0;
            opacity: 0.8;
        }

        /* Responsive */
        @media (max-width: 680px) {
            .terminal-card {
                padding: 1.3rem;
            }
            .glow-heading {
                font-size: 2.2rem;
                letter-spacing: 2px;
            }
            .message-panel {
                padding: 1.2rem;
            }
            .message-content {
                font-size: 0.88rem;
            }
            .loader-text {
                font-size: 1.1rem;
                padding: 0.6rem 1.2rem;
            }
        }

        @media (max-width: 480px) {
            .glow-heading {
                font-size: 1.8rem;
            }
            .message-content {
                font-size: 0.8rem;
            }
            .badge-item {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<!-- Loading Overlay -->
<div id="loadingOverlay" class="loading-overlay">
    <div class="loader-text">⟳ Loading Eid Greeting... ⟳</div>
    <div class="loader-sub">>> initializing secure channel || burger protocol activated 🍔</div>
</div>

<div class="greeting-container" id="mainContent" style="opacity: 0;">
    <div class="terminal-card">
        <h1 class="glow-heading">EID MUBARAK</h1>
        <div class="message-panel">
            <div class="message-content" id="messageBox">
                <span id="dynamicMsg"></span><span id="cursorBlink" class="cursor"></span>
            </div>
        </div>
        <div class="footer-badge">
            <span class="badge-item">🔐 friendly_connection.exe</span>
            <span class="badge-item">🍔 <span class="burger-emoji">burger_mode</span> 🍔</span>
        </div>
    </div>
</div>

<script>
    (function() {
        // ----- EXACT MESSAGE with playful nick and burger theme -----
        const fullMessage = `Eid Mubarak, Zaeema Kashaf! 🌙✨  
Or should I say… Eid Mubarak Burger Zaeema 😄🍔  
It’s always great to have such a supportive and fun class fellow in university. Hope you become a hacker one day!  
May Allah bless you with happiness, success, and a wonderful Eid! Enjoy your day, and of course… don’t eat too many burgers 😄🤍`;

        // ========== 1. SUBTLE MATRIX / DIGITAL RAIN BACKGROUND ==========
        const canvas = document.getElementById('matrixCanvas');
        let ctx = canvas.getContext('2d');
        let width, height;
        let drops = [];
        const matrixSymbols = "01アイウエオカキ01BURGER01EID10#@%&ZAEMA🍔";

        function initMatrix() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            const columns = Math.floor(width / 26);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -80;
            }
        }

        function drawMatrix() {
            if (!ctx) return;
            ctx.fillStyle = "rgba(1, 3, 8, 0.045)";
            ctx.fillRect(0, 0, width, height);
            ctx.font = "bold 15px 'Fira Code', monospace";
            for (let i = 0; i < drops.length; i++) {
                const randomChar = matrixSymbols[Math.floor(Math.random() * matrixSymbols.length)];
                const x = i * 26;
                const y = drops[i] * 18;
                const glowOpacity = 0.2 + Math.sin(Date.now() * 0.002 + i) * 0.1;
                ctx.fillStyle = `rgba(0, 230, 180, ${glowOpacity * 0.65})`;
                ctx.fillText(randomChar, x, y);
                if (y > height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i] += 0.32; // slow and soothing
                if (drops[i] * 18 > height) drops[i] = 0;
            }
            requestAnimationFrame(drawMatrix);
        }

        window.addEventListener('resize', () => {
            initMatrix();
        });
        initMatrix();
        drawMatrix();

        // ========== 2. TYPING ANIMATION (with newline support) ==========
        const dynamicSpan = document.getElementById('dynamicMsg');
        const cursorSpan = document.getElementById('cursorBlink');
        let idx = 0;
        let typingTimer = null;
        let isTypingFinished = false;

        function typeCharacter() {
            if (idx < fullMessage.length) {
                let ch = fullMessage[idx];
                if (ch === '\n') {
                    dynamicSpan.appendChild(document.createElement('br'));
                } else {
                    dynamicSpan.appendChild(document.createTextNode(ch));
                }
                idx++;
                let speed = 38 + Math.random() * 26;
                typingTimer = setTimeout(typeCharacter, speed);
            } else {
                isTypingFinished = true;
                // cursor remains blinking (CSS handles it)
                if (cursorSpan) cursorSpan.style.display = 'inline-block';
            }
        }

        // ========== 3. LOADING OVERLAY SEQUENCE ==========
        const loader = document.getElementById('loadingOverlay');
        const mainDiv = document.getElementById('mainContent');
        
        // reset message container before typing
        dynamicSpan.innerHTML = '';
        idx = 0;

        // show loading for 1.8 seconds, then fade out and reveal content + start typing
        setTimeout(() => {
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => {
                    if (loader && loader.parentNode) loader.style.display = 'none';
                }, 850);
            }
            // fade in main content smoothly
            mainDiv.style.transition = 'opacity 1s ease';
            mainDiv.style.opacity = '1';
            
            // start typing after a subtle delay for elegant entrance
            setTimeout(() => {
                typeCharacter();
            }, 280);
        }, 1800);

        // fallback: in case any weird race condition, start typing after max 3 seconds
        setTimeout(() => {
            if (!isTypingFinished && dynamicSpan.innerHTML.length === 0 && idx === 0) {
                typeCharacter();
            }
        }, 3500);

        // ========== 4. ADD FUN REAL-TIME CLOCK / HACKER STYLE BADGE ==========
        const timeBadge = document.querySelector('.footer-badge .badge-item:first-child');
        if (timeBadge) {
            const updateSecureTime = () => {
                const now = new Date();
                const timeString = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
                timeBadge.innerHTML = `🔐 session_active | ${timeString}`;
            };
            updateSecureTime();
            setInterval(updateSecureTime, 1000);
        }

        // Burger badge playful wiggle enhancement (already CSS wiggle)
        const burgerSpan = document.querySelector('.burger-emoji');
        if (burgerSpan) {
            setInterval(() => {
                if (Math.random() > 0.7) {
                    burgerSpan.style.transform = 'rotate(3deg)';
                    setTimeout(() => { if(burgerSpan) burgerSpan.style.transform = 'rotate(0deg)'; }, 200);
                }
            }, 1800);
        }

        // ========== 5. ADD FLOATING PARTICLE SPARKLES (extra magic touch) ==========
        // create additional tiny sparkles for cheerful vibe
        const sparkleCanvas = document.createElement('canvas');
        sparkleCanvas.style.position = 'fixed';
        sparkleCanvas.style.top = '0';
        sparkleCanvas.style.left = '0';
        sparkleCanvas.style.width = '100%';
        sparkleCanvas.style.height = '100%';
        sparkleCanvas.style.pointerEvents = 'none';
        sparkleCanvas.style.zIndex = '1';
        sparkleCanvas.style.opacity = '0.4';
        document.body.appendChild(sparkleCanvas);
        let sparkleCtx = sparkleCanvas.getContext('2d');
        let sparkleWidth, sparkleHeight;
        let sparkles = [];

        function initSparkles() {
            sparkleWidth = window.innerWidth;
            sparkleHeight = window.innerHeight;
            sparkleCanvas.width = sparkleWidth;
            sparkleCanvas.height = sparkleHeight;
            sparkles = [];
            for (let i = 0; i < 45; i++) {
                sparkles.push({
                    x: Math.random() * sparkleWidth,
                    y: Math.random() * sparkleHeight,
                    radius: Math.random() * 2 + 1,
                    alpha: Math.random() * 0.5 + 0.2,
                    speedY: Math.random() * 0.3 + 0.1,
                    color: Math.random() > 0.6 ? '#0ff' : '#f5d742'
                });
            }
        }

        function drawSparkles() {
            if (!sparkleCtx) return;
            sparkleCtx.clearRect(0, 0, sparkleWidth, sparkleHeight);
            for (let s of sparkles) {
                sparkleCtx.beginPath();
                sparkleCtx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                sparkleCtx.fillStyle = s.color;
                sparkleCtx.shadowBlur = 6;
                sparkleCtx.shadowColor = s.color === '#0ff' ? '#0ff' : '#ffb347';
                sparkleCtx.globalAlpha = s.alpha + 0.08 * Math.sin(Date.now() * 0.003);
                sparkleCtx.fill();
                s.y -= s.speedY;
                if (s.y < -10) {
                    s.y = sparkleHeight + 10;
                    s.x = Math.random() * sparkleWidth;
                }
            }
            sparkleCtx.globalAlpha = 1;
            sparkleCtx.shadowBlur = 0;
            requestAnimationFrame(drawSparkles);
        }

        window.addEventListener('resize', () => {
            initSparkles();
        });
        initSparkles();
        drawSparkles();

        // Cleanup typing timeout on page unload
        window.addEventListener('beforeunload', () => {
            if (typingTimer) clearTimeout(typingTimer);
        });

        // ensure cursor remains visible after typing and mobile friendly
        const styleTag = document.createElement('style');
        styleTag.textContent = `* { -webkit-tap-highlight-color: transparent; }`;
        document.head.appendChild(styleTag);
        
        // orientation change handler for both matrix and sparkles
        window.addEventListener('orientationchange', () => {
            setTimeout(() => {
                initMatrix();
                initSparkles();
            }, 80);
        });
        
        console.log("🍔 Eid Greeting Active | Burger Zaeema Mode ON | Friendly Cyber Vibe 🤍");
    })();
</script>
</body>
</html>
